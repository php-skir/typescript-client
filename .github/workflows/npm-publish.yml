name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  verify:
    name: Verify package
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Build package tarball
        run: npm pack --ignore-scripts

      - name: Upload package tarball
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: "*.tgz"
          if-no-files-found: error

  publish:
    name: Publish to npm
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Download package tarball
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: package

      - name: Publish
        run: npm publish package/*.tgz --ignore-scripts --provenance --access public
