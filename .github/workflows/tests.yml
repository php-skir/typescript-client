name: Tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node:
          - "22"
          - "24"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  coverage:
    name: Coverage
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Test coverage badge publisher
        run: bash .github/scripts/publish-coverage-badge.test.sh

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Measure coverage
        run: npm run test:coverage

      - name: Generate coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          percentage=$(node -p 'JSON.parse(require("node:fs").readFileSync("coverage/coverage-summary.json", "utf8")).total.lines.pct')
          node .github/scripts/write-coverage-badge.mjs "$percentage" build/coverage.svg

      - name: Upload coverage badge
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-badge
          path: build/coverage.svg

  coverage-badge:
    name: Publish coverage badge
    if: github.ref == 'refs/heads/main'
    needs: coverage
    runs-on: ubuntu-latest
    concurrency:
      group: coverage-badge
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download coverage badge
        uses: actions/download-artifact@v4
        with:
          name: coverage-badge
          path: build

      - name: Publish coverage badge
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash .github/scripts/publish-coverage-badge.sh build/coverage.svg
